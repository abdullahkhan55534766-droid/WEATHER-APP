<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="weather-container">
        <div class="temp"></div>

        <div class="time-location">
          <p>20</p>
          <p>london</p>
        </div>
        <div class="condition">
          <p>date and time</p>
          <p>mist</p>
        </div>
      </div>
      <nav>
      <form action="seachbar" >
        <input type="text" placeholder="Enter location" class="search-area">
        <button type="submit" class="btn-hover">Search</button>
      </form>
    </nav>
    
    
    </div>
  
    <script src="first.js"></script>
  </body>
</html>
